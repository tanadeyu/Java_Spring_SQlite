<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>販売登録 | BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #E9ECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #495057;
            --border: #ADB5BD;
            --accent: #343A40;
            --accent-hover: #212529;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 48px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .nav {
            padding: 0;
            margin: 0 0 32px 0;
            display: flex;
            gap: 6px;
        }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .nav a:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            background: var(--bg-primary);
            transition: all 0.2s ease;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 58, 64, 0.1);
        }
        .item-row {
            background: var(--bg-secondary);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .item-row .form-row {
            margin-bottom: 16px;
        }
        .btn {
            padding: 12px 24px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border);
        }
        .btn-back {
            text-decoration: none;
            display: inline-block;
        }
        .btn-submit {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        .btn-submit:hover {
            background: #495057;
            color: var(--bg-primary);
            border-color: #495057;
        }
        .error {
            color: #cc0000;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid #cc0000;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/sales">戻る</a>
        </div>
        <h1>新規販売登録</h1>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form th:action="@{/sales/create}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>販売日</label>
                    <input type="date" name="saleDate" th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                </div>
                <div class="form-group">
                    <label>顧客</label>
                    <select name="customerId" required>
                        <option value="">選択してください</option>
                        <option th:each="customer : ${customers}"
                                th:value="${customer.id}"
                                th:text="${customer.name}">顧客名</option>
                    </select>
                </div>
            </div>

            <th:block th:each="i : ${#numbers.sequence(1, 3)}">
                <div class="item-row">
                    <div class="form-row">
                        <div class="form-group">
                            <label th:text="'商品 ' + ${i}">商品1</label>
                            <select name="productIds">
                                <option value="">（選択しない）</option>
                                <option th:each="product : ${products}"
                                        th:value="${product.id}"
                                        th:text="${product.name} + ' (' + ${product.price} + '円)'">商品名</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>数量</label>
                            <input type="number" name="quantities" min="1" placeholder="数量">
                        </div>
                    </div>
                </div>
            </th:block>

            <div class="form-row">
                <div class="form-group">
                    <button type="submit" class="btn btn-submit">登録</button>
                </div>
                <div class="form-group">
                    <a href="/sales" class="btn btn-back">キャンセル</a>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
