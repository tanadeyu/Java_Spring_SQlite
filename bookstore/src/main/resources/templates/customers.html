<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客管理 | BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #E9ECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #495057;
            --border: #ADB5BD;
            --accent: #343A40;
            --accent-hover: #212529;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 48px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }
        .list-section {
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            background: var(--bg-secondary);
            color: var(--accent);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover { background: var(--bg-secondary); }
        .nav {
            padding: 0;
            margin: 0 0 32px 0;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .nav a:hover, .nav a.active {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">ダッシュボード</a>
            <a href="/products">商品管理</a>
            <a href="/sales">販売管理</a>
        </div>
        <h1>顧客管理</h1>
        <div class="list-section">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>氏名</th>
                        <th>メールアドレス</th>
                        <th>会員番号</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="customer : ${customers}">
                        <td th:text="${customer.id}">1</td>
                        <td th:text="${customer.name}">氏名</td>
                        <td th:text="${customer.email}">email@example.com</td>
                        <td th:text="${customer.memberNumber}">****-****-****-****</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
