<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>販売管理 | BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #E9ECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #495057;
            --border: #ADB5BD;
            --accent: #343A40;
            --accent-hover: #212529;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 48px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: var(--bg-secondary);
            color: var(--accent);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover { background: var(--bg-secondary); }
        .btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 13px;
            margin-right: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border);
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #495057;
            color: var(--bg-primary);
            border-color: #495057;
        }
        .nav {
            padding: 0;
            margin: 0 0 32px 0;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .nav a:hover, .nav a.active {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        .modal-content {
            background-color: var(--bg-primary);
            margin: 8% auto;
            padding: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        .close {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-secondary);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
            transition: color 0.2s ease;
        }
        .close:hover {
            color: var(--accent);
        }
        .close:focus {
            outline: none;
            color: var(--accent);
        }
        /* モーダル内のリンクスタイルリセット */
        #modalBody a {
            color: var(--accent);
            text-decoration: none;
        }
        #modalBody a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">ダッシュボード</a>
            <a href="/products">商品管理</a>
            <a href="/customers">顧客管理</a>
        </div>
        <h1>
            販売管理
            <a href="/sales/new" class="btn btn-primary" style="float: right; padding: 8px 16px;">新規登録</a>
        </h1>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>日付</th>
                    <th>顧客</th>
                    <th>合計金額</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="header : ${headers}">
                    <td th:text="${header.id}">1</td>
                    <td th:text="${header.saleDate}">2024-01-01</td>
                    <td th:text="${header.customer.name}">顧客名</td>
                    <td th:text="${#numbers.formatInteger(header.totalAmount, 3, 'COMMA') + '円'}">1000円</td>
                    <td>
                        <button class="btn btn-edit" th:onclick="'showDetail(' + ${header.id} + ')'">詳細</button>
                        <form th:action="@{/sales/{id}/delete(id=${header.id})}" method="post" style="display: inline;" onsubmit="return confirm('削除しますか？')">
                            <button type="submit" class="btn btn-delete">削除</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 詳細モーダル -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>販売明細</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        function showDetail(headerId) {
            fetch('/sales/' + headerId + '/detail')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('modalBody').innerHTML = html;
                    document.getElementById('detailModal').style.display = 'block';
                });
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        // モーダル外側クリックで閉じる
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
