<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 | BookStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #E9ECEF;
            --text-primary: #1A1A1A;
            --text-secondary: #495057;
            --border: #ADB5BD;
            --accent: #343A40;
            --accent-hover: #212529;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 48px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }
        .list-section {
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            background: var(--bg-secondary);
            color: var(--accent);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover { background: var(--bg-secondary); }
        .error {
            color: #cc0000;
            font-size: 14px;
            margin-top: 3px;
        }
        .nav {
            padding: 0;
            margin: 0 0 32px 0;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .nav a:hover, .nav a.active {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">ダッシュボード</a>
            <a href="/customers">顧客管理</a>
            <a href="/sales">販売管理</a>
        </div>
        <h1>商品管理</h1>
        <div class="list-section">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>商品名</th>
                        <th>説明</th>
                        <th>価格</th>
                        <th>在庫</th>
                        <th>カテゴリ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}">1</td>
                        <td th:text="${product.name}">商品名</td>
                        <td th:text="${product.description}">説明</td>
                        <td th:text="${product.price}">1000</td>
                        <td th:text="${product.stock}">10</td>
                        <td>
                            <span th:each="category, stat : ${product.categories}">
                                <span th:text="${category.name}">カテゴリ</span><span th:if="${not stat.last}">, </span>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script th:inline="javascript">
        const products = [[${products}]];

        document.querySelector('form').addEventListener('submit', function(e) {
            if (!document.getElementById('editId').value) {
                this.action = '/products';
            }
        });
    </script>
</body>
</html>
