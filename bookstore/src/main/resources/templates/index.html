<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>ダッシュボード - BookStore</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		:root {
			--bg-primary: #FFFFFF;
			--bg-secondary: #E9ECEF;
			--text-primary: #1A1A1A;
			--text-secondary: #495057;
			--border: #ADB5BD;
			--accent: #343A40;
			--accent-hover: #212529;
		}
		body {
			font-family: 'Helvetica Neue', Arial, sans-serif;
			background: var(--bg-secondary);
			min-height: 100vh;
			padding: 20px;
			color: var(--text-primary);
		}
		.container {
			max-width: 1200px;
			margin: 0 auto;
			background: var(--bg-primary);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 48px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
		}
		header {
			padding: 0 0 24px 0;
			margin-bottom: 32px;
			border-bottom: 1px solid var(--border);
		}
		header h1 {
			font-size: 1.75rem;
			font-weight: 600;
			letter-spacing: -0.02em;
		}
		nav {
			padding: 0;
			margin: 0 0 32px 0;
			display: flex;
			gap: 6px;
			align-items: center;
		}
		nav a {
			color: var(--text-secondary);
			text-decoration: none;
			padding: 10px 18px;
			border-radius: 6px;
			border: 1px solid transparent;
			transition: all 0.2s ease;
			font-size: 14px;
		}
		nav a:hover, nav a.active {
			color: var(--text-primary);
			background: var(--bg-secondary);
		}
		.stat-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
			gap: 24px;
			margin-bottom: 48px;
		}
		.stat-card {
			background: var(--bg-primary);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 32px;
			text-align: center;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
			transition: all 0.2s ease;
		}
		.stat-card:hover {
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
			transform: translateY(-2px);
		}
		.stat-card .value {
			font-size: 2.25rem;
			font-weight: 600;
			color: var(--accent);
		}
		.stat-card .label {
			margin-top: 8px;
			color: var(--text-secondary);
			font-size: 14px;
		}
		.card {
			background: var(--bg-primary);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 28px;
			margin-bottom: 24px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
		}
		.card h3 {
			font-size: 1.1rem;
			font-weight: 600;
			margin-bottom: 20px;
			padding-bottom: 16px;
			border-bottom: 1px solid var(--border);
			letter-spacing: -0.01em;
		}
		table {
			width: 100%;
			border-collapse: collapse;
		}
		th, td {
			padding: 12px 16px;
			text-align: left;
			border-bottom: 1px solid var(--border);
		}
		th {
			background: var(--bg-secondary);
			color: var(--accent);
			font-weight: 600;
			font-size: 13px;
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}
		tr:hover { background: var(--bg-secondary); }
		.rank {
			display: inline-block;
			width: 28px;
			height: 28px;
			line-height: 28px;
			text-align: center;
			background: var(--bg-secondary);
			color: var(--accent);
			font-weight: 600;
			font-size: 14px;
			border: 1px solid var(--border);
			border-radius: 4px;
		}
		.rank-1 { border-color: var(--accent); }
		.rank-2 { border-color: #495057; }
		.rank-3 { border-color: #6C757D; }
	</style>
</head>
<body>
	<div class="container">
		<header>
			<h1>📚 BookStore データ分析システム</h1>
		</header>
		<nav>
			<a href="/">📊 ダッシュボード</a>
			<a href="/products">📦 商品管理</a>
			<a href="/customers">👥 顧客管理</a>
			<a href="/sales">💰 販売管理</a>
		</nav>

		<!-- 統計サマリー -->
		<div class="stat-grid">
			<div class="stat-card">
				<div class="value" th:text="${#numbers.formatInteger(totalSales, 3, 'COMMA')} + '円'">0円</div>
				<div class="label">総売上金額</div>
			</div>
			<div class="stat-card">
				<div class="value" th:text="${totalQuantity}">0</div>
				<div class="label">総販売冊数</div>
			</div>
		</div>

		<!-- 売上ランキング -->
		<div class="card">
			<h3>🏆 売上ランキング TOP10</h3>
			<table>
				<thead>
					<tr>
						<th>順位</th>
						<th>商品名</th>
						<th>売上金額</th>
						<th>販売冊数</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="item, stat : ${ranking}">
						<td>
							<span class="rank"
								  th:class="'rank rank-' + ${stat.count}"
								  th:text="${stat.count}">1</span>
						</td>
						<td th:text="${item.name}">商品名</td>
						<td th:text="${#numbers.formatInteger(item.totalSales, 3, 'COMMA')} + '円'">0円</td>
						<td th:text="${item.saleQuantity} + '冊'">0冊</td>
					</tr>
				</tbody>
			</table>
		</div>

		<!-- カテゴリ別売上 -->
		<div class="card">
			<h3>📈 カテゴリ別売上</h3>
			<table>
				<thead>
					<tr>
						<th>カテゴリ</th>
						<th>売上金額</th>
						<th>販売冊数</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="item : ${categorySales}">
						<td th:text="${item.categoryName}">カテゴリ</td>
						<td th:text="${#numbers.formatInteger(item.totalSales, 3, 'COMMA')} + '円'">0円</td>
						<td th:text="${item.productCount} + '冊'">0冊</td>
					</tr>
				</tbody>
			</table>
		</div>

		<!-- 顧客別売上 -->
		<div class="card">
			<h3>👤 顧客別購入金額</h3>
			<table>
				<thead>
					<tr>
						<th>顧客名</th>
						<th>総購入金額</th>
						<th>購入回数</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="item : ${customerSales}">
						<td th:text="${item.customerName}">顧客名</td>
						<td th:text="${#numbers.formatInteger(item.totalSales, 3, 'COMMA')} + '円'">0円</td>
						<td th:text="${item.purchaseCount} + '回'">0回</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</body>
</html>
